replicaCount: 2

image:
  repository: 516008588803.dkr.ecr.us-east-1.amazonaws.com/k8s-cicd
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ecr-creds

service:
  name: crud-app
  type: LoadBalancer
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  annotations: {}
  hosts:
    - host: crud-app.local
      paths: ["/"]

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

securityContext:
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

serviceAccount:
  create: true
  name: ""
